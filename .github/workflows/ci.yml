name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: pip install ".[dev]" pytest || pip install . pytest

      - name: Smoke test – import package
        run: python -c "import solwa; from solwa import rcwa, geometry, materials; print(f'solwa {solwa.__version__}')"

      - name: Run tests
        run: python -m pytest tests/ -v
